<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>페이스 — 수행평가 대시보드</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy@main/Paperlogy.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap">

<style>
  :root{
    color-scheme: dark;
    --ink: #16141C;
    --ink-2: #1B1822;
    --surface: #201D29;
    --surface-2: #26222F;
    --paper: #F4F1EC;
    --muted: #9C96AC;
    --blade-a: #FF6B6B;
    --blade-b: #9B8CFF;
    --rose: #FF5C7A;
    --neutral: #8F8AA8;
    --teal: #4FC7B0;
    --done-col: #6E7787;
    --track: rgba(244,241,236,0.09);
    --border: rgba(244,241,236,0.09);
    --shadow: rgba(0,0,0,0.35);
  }
  :root[data-theme="light"]{
    color-scheme: light;
    --ink: #F1EEE8;
    --ink-2: #F7F5F0;
    --surface: #FFFFFF;
    --surface-2: #FAF8F4;
    --paper: #221F2B;
    --muted: #726C81;
    --track: rgba(34,31,43,0.08);
    --border: rgba(34,31,43,0.10);
    --shadow: rgba(60,50,40,0.10);
  }
  @media (prefers-color-scheme: light){
    :root:not([data-theme="dark"]){
      color-scheme: light;
      --ink: #F1EEE8;
      --ink-2: #F7F5F0;
      --surface: #FFFFFF;
      --surface-2: #FAF8F4;
      --paper: #221F2B;
      --muted: #726C81;
      --track: rgba(34,31,43,0.08);
      --border: rgba(34,31,43,0.10);
      --shadow: rgba(60,50,40,0.10);
    }
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    transition: background .35s ease, color .35s ease;
    position: relative;
    overflow-x: hidden;
  }
  body::before{
    content:"";
    position: fixed; inset: -10%;
    background-image:
      radial-gradient(60% 45% at 15% 0%, rgba(255,107,107,0.10), transparent 60%),
      radial-gradient(55% 40% at 100% 10%, rgba(155,140,255,0.10), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  :root[data-theme="light"] body::before{
    background-image:
      radial-gradient(60% 45% at 15% 0%, rgba(255,107,107,0.06), transparent 60%),
      radial-gradient(55% 40% at 100% 10%, rgba(155,140,255,0.08), transparent 60%);
  }

  .num{ font-family: 'Space Grotesk', 'Pretendard Variable', sans-serif; font-variant-numeric: tabular-nums; }
  .display{ font-family: 'Paperlogy', 'Pretendard Variable', sans-serif; }

  .wrap{
    position: relative; z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 20px 18px 64px;
  }
  @media (min-width: 720px){
    .wrap{
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      align-items: start;
      padding: 32px 32px 72px;
    }
    .col-main{ grid-column: 1; }
    .col-side{ grid-column: 2; position: sticky; top: 32px; }
  }

  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding: 4px 2px 18px;
  }
  @media (min-width: 720px){ header.top{ grid-column: 1 / -1; } }
  .today-label{ font-size: 14px; color: var(--muted); font-weight: 500; letter-spacing: .01em; }
  .theme-toggle{
    display:flex; align-items:center; justify-content:center;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--paper); cursor: pointer;
    transition: transform .2s ease, background .2s ease;
  }
  .theme-toggle:hover{ transform: scale(1.06); }
  .theme-toggle:focus-visible, button:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--blade-b); outline-offset: 2px;
  }
  .theme-toggle svg{ width:18px; height:18px; }

  .card{
    background: linear-gradient(180deg, var(--surface), var(--surface-2));
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 12px 30px var(--shadow);
    padding: 20px;
  }

  /* ---- assignment card ---- */
  .assign{
    margin-bottom: 14px;
    opacity: 0; transform: translateY(10px);
    animation: rise .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .assign:nth-of-type(1){ animation-delay: .02s; }
  .assign:nth-of-type(2){ animation-delay: .08s; }
  .assign:nth-of-type(3){ animation-delay: .14s; }
  .assign:nth-of-type(4){ animation-delay: .20s; }
  .assign:nth-of-type(5){ animation-delay: .26s; }
  @keyframes rise{ to{ opacity:1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce){
    .assign{ animation: none; opacity: 1; transform: none; }
  }

  .assign.hero .card{ padding: 24px 22px 22px; border-radius: 26px; }
  .assign.status-done .card{ opacity: .6; }
  .assign.missed .card{
    border-color: var(--rose);
    box-shadow: 0 12px 30px var(--shadow), 0 0 0 1px var(--rose);
  }
  .card.flash{ animation: cardFlash .9s ease; }
  @keyframes cardFlash{
    0%,100%{ box-shadow: 0 12px 30px var(--shadow); }
    30%{ box-shadow: 0 12px 30px var(--shadow), 0 0 0 2px var(--blade-b), 0 0 24px 4px rgba(155,140,255,.35); }
  }
  @media (prefers-reduced-motion: reduce){
    .card.flash{ animation: none; box-shadow: 0 12px 30px var(--shadow), 0 0 0 2px var(--blade-b); }
  }
  .assign .subject-row{ display:flex; align-items:center; gap:8px; margin-bottom: 10px; }
  .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .subject-name{ font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .02em; }
  .dday{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; padding:3px 9px; border-radius:20px; background: var(--track); color: var(--paper); margin-left:auto; }
  .assign.hero .dday{ font-family:'Paperlogy',sans-serif; font-size: 30px; font-weight: 800; background: none; padding: 0; line-height:1; letter-spacing: -0.01em; }
  .assign.hero .subject-row{ align-items: flex-start; }
  .assign.missed .dday{ color: var(--rose); background: rgba(255,92,122,0.14); }
  .assign.hero.missed .dday{ color: var(--rose); }

  .title{ font-size: 15px; font-weight: 600; line-height: 1.35; margin: 0 0 16px; }
  .assign.hero .title{ font-size: 19px; font-weight: 700; margin-bottom: 20px; }

  .bar-zone{ position: relative; padding-top: 16px; margin-bottom: 10px; }
  .track{ position:relative; height: 10px; border-radius: 8px; background: var(--track); overflow: visible; }
  .assign.hero .track{ height: 14px; border-radius: 10px; }
  .fill{
    position:absolute; inset:0; width:0%; border-radius: 8px;
    background: linear-gradient(90deg, var(--neutral), #ADA8C9);
    opacity: .6;
    transition: width .55s cubic-bezier(.22,1,.36,1), background .3s ease;
  }
  .assign.status-behind .fill{ background: linear-gradient(90deg, var(--rose), #FF8FA3); opacity: .7; }
  .assign.status-neutral .fill{ background: linear-gradient(90deg, var(--neutral), #ADA8C9); opacity: .6; }
  .assign.status-ahead .fill{ background: linear-gradient(90deg, var(--teal), #7FE0CB); opacity: .7; }
  .assign.status-done .fill{ background: var(--done-col); opacity: .4; }
  .blade{
    position:absolute; top:-9px; bottom:-9px; left:0%;
    width: 3px; border-radius: 3px;
    background: linear-gradient(180deg, var(--blade-a), var(--blade-b));
    box-shadow: 0 0 10px 1px rgba(255,107,107,.55), 0 0 16px 3px rgba(155,140,255,.35);
    transform: translateX(-50%);
  }
  .assign.hero .blade{ top:-11px; bottom:-11px; width:4px; animation: breathe 2.6s ease-in-out infinite; }
  @keyframes breathe{
    0%,100%{ opacity: .75; transform: translateX(-50%) scaleY(1); }
    50%{ opacity: 1; transform: translateX(-50%) scaleY(1.12); }
  }
  @media (prefers-reduced-motion: reduce){ .assign.hero .blade{ animation: none; } }
  .blade-label{
    position:absolute; top:-30px; left:0%; transform: translateX(-50%);
    font-family:'Space Grotesk',sans-serif; font-size: 11px; font-weight: 600;
    color: var(--muted); white-space: nowrap;
  }
  .blade-label.edge-left{ transform: translateX(0); }
  .blade-label.edge-right{ transform: translateX(-100%); }
  .assign.hero .blade-label{ top:-32px; font-size: 12px; }

  .stat-row{ display:flex; align-items:baseline; justify-content:space-between; margin-top: 14px; flex-wrap: wrap; gap: 6px 12px; }
  .prep-val{ font-family:'Space Grotesk',sans-serif; font-weight: 700; font-size: 15px; }
  .assign.hero .prep-val{ font-size: 17px; }
  .prep-val .sub{ font-size: 12px; color: var(--muted); font-weight: 500; margin-right: 5px; }
  .delta{ display:flex; align-items:center; gap: 4px; font-family:'Space Grotesk',sans-serif; font-weight: 700; font-size: 13px; padding: 3px 9px; border-radius: 20px; }
  .delta.behind{ color: var(--rose); background: rgba(255,92,122,0.12); }
  .delta.ahead{ color: var(--teal); background: rgba(79,199,176,0.14); }
  .delta.neutral{ color: var(--neutral); background: rgba(143,138,168,0.14); }
  .delta.done{ color: var(--done-col); background: rgba(110,119,135,0.14); }
  .delta svg{ width:11px; height:11px; }

  .foot-row{ display:flex; align-items:center; justify-content:space-between; margin-top: 16px; gap: 10px; }
  .notice{ display:flex; align-items:center; gap:6px; font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .notice svg{ width:14px; height:14px; opacity:.85; }
  .notice.none{ opacity: .45; }

  .stepper{ display:flex; align-items:center; gap: 10px; }
  .stepper button{
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--track);
    color: var(--paper); font-size: 16px; font-weight: 700; line-height:1;
    cursor: pointer; display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, background .15s ease;
    font-family: 'Space Grotesk', sans-serif;
  }
  .stepper button:hover{ background: var(--surface-2); transform: scale(1.08); }
  .stepper button:active{ transform: scale(.94); }
  .stepper button:disabled{ opacity: .3; cursor: not-allowed; }
  .stepper button:disabled:hover{ transform: none; background: var(--track); }
  .stepper .pct{ min-width: 42px; text-align:center; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; }

  .section-label{
    font-size: 12.5px; font-weight: 700; color: var(--muted);
    letter-spacing: .04em; text-transform: uppercase;
    margin: 22px 2px 12px;
  }
  .col-main > .section-label:first-of-type{ margin-top: 26px; }

  /* ---- calendar ---- */
  .cal-card{ margin-top: 4px; }
  @media (min-width: 720px){ .cal-card{ margin-top: 0; } }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 18px; }
  .cal-title{ font-family:'Paperlogy',sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -.01em; }
  .cal-nav{ display:flex; align-items:center; gap: 6px; }
  .cal-nav button{
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--track); color: var(--paper); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .cal-nav button:hover{ background: var(--surface-2); }
  .cal-nav svg{ width: 16px; height:16px; }

  .cal-weekdays{ display:grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
  .cal-weekdays span{ text-align:center; font-size: 12.5px; font-weight: 700; color: var(--muted); padding: 4px 0; }

  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
  .cal-cell{
    position: relative;
    min-height: 52px;
    border-radius: 14px;
    background: var(--track);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding: 8px 0 6px;
    font-family:'Space Grotesk',sans-serif; font-weight: 600; font-size: 14.5px;
    border: 1px solid transparent;
  }
  @media (min-width: 720px){ .cal-cell{ min-height: 62px; font-size: 15.5px; } }
  .cal-cell.empty{ background: transparent; }
  .cal-cell.has-event{ cursor: pointer; }
  .cal-cell.has-event:hover{ background: var(--surface-2); }
  .cal-cell.today{ border-color: var(--blade-a); box-shadow: 0 0 0 1px var(--blade-a) inset; }
  .cal-cell.today .day-num{ color: var(--blade-a); font-weight: 800; }

  .day-num{ color: var(--paper); }
  .cal-dots{ display:flex; gap: 3px; margin-top: 5px; height: 6px; }
  .cal-dots span{ width: 6px; height: 6px; border-radius: 50%; }

  footer.hint{
    text-align:center; color: var(--muted); font-size: 12px; margin-top: 26px; padding: 0 8px;
  }
  @media (min-width: 720px){ footer.hint{ grid-column: 1 / -1; } }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <span class="today-label" id="todayLabel"></span>
    <button class="theme-toggle" id="themeToggle" aria-label="테마 전환" type="button">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
  </header>

  <div class="col-main">
    <div id="heroSlot"></div>
    <div class="section-label">다음 일정</div>
    <div id="listSlot"></div>
  </div>

  <div class="col-side">
    <div class="card cal-card">
      <div class="cal-head">
        <div class="cal-nav">
          <button id="calPrev" type="button" aria-label="이전 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>
        <div class="cal-title" id="calTitle"></div>
        <div class="cal-nav">
          <button id="calNext" type="button" aria-label="다음 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <footer class="hint">기준선은 오늘까지 준비했어야 할 지점이에요. 막대가 기준선을 넘으면 앞선 거예요.</footer>
</div>

<script>
(function(){
  "use strict";

  var SUBJECTS = {
    '수학': '#FF8A65',
    '영어': '#7EC8C1',
    '과학': '#B8A6FF',
    '국어': '#FFD166',
    '사회': '#8FB88F'
  };

  var today = new Date();
  today.setHours(0,0,0,0);

  function addDays(base, n){
    var d = new Date(base);
    d.setDate(d.getDate() + n);
    return d;
  }

  var RAW = [
    { subject:'수학', title:'단원평가 대비 포트폴리오', assignedOffset:-12, dueOffset:3,  prep:45,  notice:true },
    { subject:'영어', title:'수행평가 스피킹 녹음',      assignedOffset:-7,  dueOffset:7,  prep:51,  notice:false },
    { subject:'과학', title:'실험보고서 제출',            assignedOffset:-3,  dueOffset:12, prep:3,   notice:true },
    { subject:'사회', title:'모둠 발표 준비',              assignedOffset:-5,  dueOffset:18, prep:25,  notice:false },
    { subject:'국어', title:'독서감상문',                  assignedOffset:-20, dueOffset:20, prep:70,  notice:false },
    { subject:'수학', title:'수행 과제 오답노트',          assignedOffset:-2,  dueOffset:25, prep:5,   notice:false },
    { subject:'영어', title:'단어시험 오답 정리',          assignedOffset:-15, dueOffset:-3, prep:70,  notice:false },
    { subject:'과학', title:'수행 발표 리허설 영상',        assignedOffset:-10, dueOffset:-1, prep:100, notice:false },
    { subject:'국어', title:'한자 급수 시험 준비',          assignedOffset:-10, dueOffset:5,  prep:100, notice:false }
  ];

  var items = RAW.map(function(r, i){
    var due = addDays(today, r.dueOffset);
    var assigned = addDays(today, r.assignedOffset);
    var total = r.dueOffset - r.assignedOffset;
    var elapsed = 0 - r.assignedOffset;
    var expected = Math.max(0, Math.min(100, (elapsed/total)*100));
    return {
      id: 'a'+i,
      subject: r.subject,
      color: SUBJECTS[r.subject],
      title: r.title,
      dueOffset: r.dueOffset,
      dueDate: due,
      prep: r.prep,
      expected: expected,
      notice: r.notice
    };
  }).sort(function(a,b){ return a.dueOffset - b.dueOffset; });

  var WEEKDAY_NAMES = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('todayLabel').textContent =
    (today.getMonth()+1) + '월 ' + today.getDate() + '일 ' + WEEKDAY_NAMES[today.getDay()];

  function ddayText(off){
    if(off > 0) return 'D-' + off;
    if(off === 0) return 'D-DAY';
    return Math.abs(off) + '일 지남';
  }

  function statusOf(item){
    if(item.prep >= 100) return 'done';
    var delta = item.prep - item.expected;
    if(delta <= -15) return 'behind';
    if(delta >= 15) return 'ahead';
    return 'neutral';
  }

  function edgeClass(pct){
    if(pct <= 6) return ' edge-left';
    if(pct >= 94) return ' edge-right';
    return '';
  }

  function svgClip(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 01-7.07-7.07l9.19-9.19a3.5 3.5 0 014.95 4.95l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>';
  }
  function svgArrow(dir){
    var d = dir === 'up' ? 'M12 19V5M5 12l7-7 7 7' : 'M12 5v14M19 12l-7 7-7-7';
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="'+d+'"/></svg>';
  }

  function deltaBadgeHtml(item){
    var status = statusOf(item);
    if(status === 'done') return '<span class="delta done">준비 완료</span>';
    if(status === 'neutral') return '<span class="delta neutral">일정대로</span>';
    var delta = Math.round(item.prep - item.expected);
    var behind = status === 'behind';
    return '<span class="delta ' + status + '">' + svgArrow(behind ? 'down' : 'up') + Math.abs(delta) + '%p ' + (behind ? '뒤처짐' : '앞섬') + '</span>';
  }

  function renderCard(item, isHero){
    var status = statusOf(item);
    var missed = item.dueOffset < 0 && status !== 'done';
    var classes = 'assign' + (isHero ? ' hero' : '') + ' status-' + status + (missed ? ' missed' : '');

    var noticeHtml = item.notice
      ? '<span class="notice">' + svgClip() + '공지 사진 첨부</span>'
      : '<span class="notice none">' + svgClip() + '첨부 없음</span>';

    return (
      '<div class="' + classes + '" id="card-' + item.id + '" data-id="' + item.id + '">' +
        '<div class="card">' +
          '<div class="subject-row">' +
            '<span class="dot" style="background:' + item.color + '"></span>' +
            '<span class="subject-name">' + item.subject + '</span>' +
            '<span class="dday">' + ddayText(item.dueOffset) + '</span>' +
          '</div>' +
          '<p class="title">' + item.title + '</p>' +
          '<div class="bar-zone">' +
            '<span class="blade-label' + edgeClass(item.expected) + '" style="left:' + item.expected + '%">기준 ' + Math.round(item.expected) + '%</span>' +
            '<div class="track">' +
              '<div class="fill" data-fill style="width:' + item.prep + '%"></div>' +
              '<div class="blade" style="left:' + item.expected + '%"></div>' +
            '</div>' +
          '</div>' +
          '<div class="stat-row">' +
            '<span class="prep-val"><span class="sub">준비</span><span data-prep>' + item.prep + '</span>%</span>' +
            deltaBadgeHtml(item) +
          '</div>' +
          '<div class="foot-row">' +
            noticeHtml +
            '<div class="stepper">' +
              '<button type="button" data-step="-1" aria-label="준비율 10% 감소"' + (item.prep <= 0 ? ' disabled' : '') + '>−</button>' +
              '<span class="pct" data-pct>' + item.prep + '%</span>' +
              '<button type="button" data-step="1" aria-label="준비율 10% 증가"' + (item.prep >= 100 ? ' disabled' : '') + '>+</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  }

  var activeUpcoming = items.filter(function(it){ return it.prep < 100 && it.dueOffset >= 0; })
    .sort(function(a,b){ return a.dueOffset - b.dueOffset; });
  var missedItems = items.filter(function(it){ return it.prep < 100 && it.dueOffset < 0; })
    .sort(function(a,b){ return b.dueOffset - a.dueOffset; });
  var done = items.filter(function(it){ return it.prep >= 100; })
    .sort(function(a,b){ return a.dueOffset - b.dueOffset; });

  var heroPool = missedItems.length ? missedItems : activeUpcoming;
  var hero = heroPool[0];
  var rest = missedItems.concat(activeUpcoming).concat(done)
    .filter(function(it){ return !hero || it.id !== hero.id; });

  var heroSlot = document.getElementById('heroSlot');
  var listSlot = document.getElementById('listSlot');
  heroSlot.innerHTML = hero ? renderCard(hero, true) : '';
  listSlot.innerHTML = rest.map(function(it){ return renderCard(it, false); }).join('');

  document.addEventListener('click', function(e){
    var btn = e.target.closest('[data-step]');
    if(!btn || btn.disabled) return;
    var cardEl = btn.closest('.assign');
    var id = cardEl.getAttribute('data-id');
    var item = items.filter(function(it){ return it.id === id; })[0];
    var dir = parseInt(btn.getAttribute('data-step'), 10);
    item.prep = Math.max(0, Math.min(100, item.prep + dir*10));

    cardEl.querySelector('[data-fill]').style.width = item.prep + '%';
    cardEl.querySelector('[data-prep]').textContent = item.prep;
    cardEl.querySelector('[data-pct]').textContent = item.prep + '%';

    var status = statusOf(item);
    cardEl.className = cardEl.className.replace(/status-\S+/, 'status-' + status);
    cardEl.classList.toggle('missed', item.dueOffset < 0 && status !== 'done');

    cardEl.querySelector('[data-step="-1"]').disabled = item.prep <= 0;
    cardEl.querySelector('[data-step="1"]').disabled = item.prep >= 100;

    cardEl.querySelector('.stat-row .delta').outerHTML = deltaBadgeHtml(item);
  });

  /* ---- theme toggle ---- */
  var root = document.documentElement;
  var themeToggle = document.getElementById('themeToggle');
  var themeIcon = document.getElementById('themeIcon');
  var SUN = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
  var MOON = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';

  function systemPrefersLight(){
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
  }
  function currentIsLight(){
    var forced = root.getAttribute('data-theme');
    if(forced === 'light') return true;
    if(forced === 'dark') return false;
    return systemPrefersLight();
  }
  function paintIcon(){
    themeIcon.innerHTML = currentIsLight() ? MOON : SUN;
  }
  themeToggle.addEventListener('click', function(){
    root.setAttribute('data-theme', currentIsLight() ? 'dark' : 'light');
    paintIcon();
  });
  paintIcon();

  /* ---- calendar ---- */
  var calGrid = document.getElementById('calGrid');
  var calTitle = document.getElementById('calTitle');
  var viewYear = today.getFullYear();
  var viewMonth = today.getMonth();

  function sameDay(a,b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function renderCalendar(){
    calTitle.textContent = (viewMonth+1) + '월' + (viewYear !== today.getFullYear() ? ' ' + viewYear : '');
    calGrid.innerHTML = '';
    var firstOfMonth = new Date(viewYear, viewMonth, 1);
    var startWeekday = firstOfMonth.getDay();
    var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

    for(var i=0;i<startWeekday;i++){
      var empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      calGrid.appendChild(empty);
    }

    for(var day=1; day<=daysInMonth; day++){
      var cellDate = new Date(viewYear, viewMonth, day);
      var matches = items.filter(function(it){ return sameDay(it.dueDate, cellDate); });
      var cell = document.createElement('div');
      cell.className = 'cal-cell' + (sameDay(cellDate, today) ? ' today' : '') + (matches.length ? ' has-event' : '');
      var dotsHtml = matches.map(function(it){ return '<span style="background:'+it.color+'"></span>'; }).join('');
      cell.innerHTML = '<span class="day-num">' + day + '</span>' + (matches.length ? '<span class="cal-dots">'+dotsHtml+'</span>' : '');
      if(matches.length){
        cell.setAttribute('tabindex','0');
        cell.setAttribute('role','button');
        cell.setAttribute('aria-label', (viewMonth+1)+'월 '+day+'일, '+matches.map(function(m){return m.subject+' '+m.title;}).join(', '));
        var jump = function(target){
          return function(){
            var el = document.getElementById('card-' + target.id);
            if(!el) return;
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            var innerCard = el.querySelector('.card');
            innerCard.classList.remove('flash');
            void innerCard.offsetWidth;
            innerCard.classList.add('flash');
            setTimeout(function(){ innerCard.classList.remove('flash'); }, 900);
          };
        };
        cell.addEventListener('click', jump(matches[0]));
        cell.addEventListener('keydown', function(fn){
          return function(e){ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); fn(); } };
        }(jump(matches[0])));
      }
      calGrid.appendChild(cell);
    }
  }

  document.getElementById('calPrev').addEventListener('click', function(){
    viewMonth--; if(viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', function(){
    viewMonth++; if(viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  renderCalendar();
})();
</script>
</body>
</html>
